<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo · 极夜深空</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont/lxgwwenkai-regular.css">
  <style>
    :root {
      --bg-deep: #0a0816;
      --bg-mid: #1b1938;
      --bg-glow: #2c2750;
      --text: #f3eee7;
      --text-soft: rgba(243, 238, 231, 0.7);
      --text-fade: rgba(243, 238, 231, 0.4);
      --accent: #cbb7fb;
      --accent-deep: #714cb6;
      --line: rgba(255, 255, 255, 0.08);
      --font: 'LXGW WenKai', 'Inter', system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
    }
    /* 深空渐变 + 紫色光晕 */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 90% 55% at 50% 30%, #2c2750 0%, transparent 55%),
        radial-gradient(ellipse 60% 45% at 50% 70%, #1b1938 0%, transparent 55%),
        linear-gradient(180deg, #0e0c20 0%, #0a0816 100%);
      z-index: 0;
    }
    /* 星点 */
    body::after {
      content: "";
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 13% 23%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 27% 67%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1.5px 1.5px at 53% 14%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 71% 82%, rgba(255,255,255,0.35), transparent),
        radial-gradient(1.5px 1.5px at 88% 33%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 8% 88%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 42% 91%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 91% 71%, rgba(203,183,251,0.6), transparent);
      z-index: 1;
      pointer-events: none;
      animation: twinkle 5s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.7; }
      to { opacity: 1; }
    }

    .demo-nav {
      position: fixed; top: 1.2rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 0.4rem;
      padding: 0.35rem 0.4rem;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      z-index: 100;
      font-size: 12px;
    }
    .demo-nav a {
      padding: 0.3rem 0.9rem;
      color: var(--text-soft);
      text-decoration: none;
      border-radius: 999px;
      transition: all 0.2s;
    }
    .demo-nav a:hover { color: var(--text); }
    .demo-nav a.active {
      background: var(--accent);
      color: var(--bg-deep);
    }

    .corner-brand {
      position: fixed; top: 1.4rem; left: 1.8rem;
      font-size: 14px; color: var(--text);
      letter-spacing: 0.2em;
      font-weight: 500;
      z-index: 100;
    }
    .corner-info {
      position: fixed; top: 1.4rem; right: 1.8rem;
      font-size: 12px; color: var(--text-fade);
      letter-spacing: 0.1em;
      z-index: 100;
    }

    .stage {
      position: relative;
      z-index: 2;
      max-width: 720px;
      margin: 0 auto;
      padding: 5.5rem 2rem 9rem;
      text-align: center;
    }

    /* 方形海报 + 强烈光晕 */
    .poster {
      width: 240px; height: 240px;
      margin: 0 auto 2.5rem;
      position: relative;
      border-radius: 16px;
      overflow: visible;
      animation: poster-breath 8s ease-in-out infinite;
    }
    .poster-img {
      width: 100%; height: 100%;
      border-radius: 16px;
      background:
        radial-gradient(circle at 30% 30%, #ffd6a8 0%, #f5a76d 25%, #e89571 60%, #b35c4a 100%);
      box-shadow:
        0 0 80px rgba(245, 167, 109, 0.4),
        0 0 30px rgba(203, 183, 251, 0.25),
        0 20px 60px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    .poster-img::after {
      content: "♫";
      position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 80px;
      color: rgba(255,255,255,0.4);
      font-family: serif;
    }
    @keyframes poster-breath {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.025); filter: brightness(1.08); }
    }

    .status {
      font-size: 13px;
      letter-spacing: 0.4em;
      color: var(--accent);
      text-transform: uppercase;
      margin: 0 0 1.5rem;
      font-weight: 500;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }

    .title {
      font-size: 44px;
      font-weight: 540;
      margin: 0 0 0.5rem;
      letter-spacing: 0.05em;
      line-height: 1.15;
    }
    .meta {
      font-size: 14px;
      color: var(--text-soft);
      margin: 0 0 3rem;
      letter-spacing: 0.08em;
    }
    .meta .dot { color: var(--accent); margin: 0 0.4em; }

    .narration {
      font-size: 16px;
      line-height: 2;
      color: var(--text-soft);
      max-width: 460px;
      margin: 0 auto 2rem;
      letter-spacing: 0.02em;
    }
    .narration .seg { display: block; transition: all 0.4s; opacity: 0.4; }
    .narration .seg.past { opacity: 0.25; }
    .narration .seg.active {
      opacity: 1;
      color: var(--text);
      font-size: 17px;
      text-shadow: 0 0 20px rgba(203, 183, 251, 0.25);
    }

    .lyric-divider {
      width: 30px; height: 1px;
      background: var(--accent);
      opacity: 0.4;
      margin: 2rem auto;
      border: none;
    }

    .lyrics {
      font-size: 17px;
      line-height: 2;
      max-width: 460px;
      margin: 0 auto;
    }
    .lyrics .ly {
      transition: all 0.4s;
      color: var(--text-soft);
      opacity: 0.5;
    }
    .lyrics .ly.past { opacity: 0.25; }
    .lyrics .ly.active {
      opacity: 1;
      color: var(--text);
      font-size: 20px;
      font-weight: 540;
      text-shadow: 0 0 24px rgba(203, 183, 251, 0.4);
    }

    /* 底部 transport：玻璃浮岛 */
    .transport {
      position: fixed;
      left: 50%; bottom: 1.5rem;
      transform: translateX(-50%);
      width: calc(100% - 3rem);
      max-width: 600px;
      padding: 0.9rem 1.3rem;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(32px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 50;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }
    .ctrl {
      background: transparent; border: none;
      color: var(--text); cursor: pointer;
      padding: 0.5rem;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      width: 36px; height: 36px;
      transition: all 0.2s;
    }
    .ctrl:hover { background: rgba(255,255,255,0.08); }
    .ctrl.play {
      background: var(--accent);
      color: var(--bg-deep);
      width: 42px; height: 42px;
    }
    .ctrl.play:hover { background: #d9c7ff; transform: scale(1.05); }
    .ctrl svg { width: 16px; height: 16px; fill: currentColor; }
    .ctrl.play svg { width: 18px; height: 18px; }

    .progress {
      flex: 1; display: flex; align-items: center; gap: 0.7rem;
      font-size: 11px; color: var(--text-fade);
      font-variant-numeric: tabular-nums;
    }
    .progress-bar {
      flex: 1; height: 3px;
      background: rgba(255, 255, 255, 0.1);
      position: relative;
      border-radius: 3px;
    }
    .progress-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: var(--accent);
      width: 42%;
      border-radius: 3px;
      box-shadow: 0 0 12px rgba(203, 183, 251, 0.5);
    }

    @media (max-width: 640px) {
      .poster { width: 180px; height: 180px; }
      .title { font-size: 32px; }
      .stage { padding: 5rem 1.2rem 8rem; }
    }
  </style>
</head>
<body>
  <div class="demo-nav">
    <a href="warm-study.html">暖光书房</a>
    <a href="deep-night.html" class="active">极夜深空</a>
    <a href="minimal-diary.html">极简日记</a>
    <a href="/">原版</a>
  </div>

  <div class="corner-brand">CLAUDIO</div>
  <div class="corner-info">12:43 · ☀ 22°</div>

  <main class="stage">
    <div class="poster">
      <div class="poster-img"></div>
    </div>

    <p class="status">SPEAKING ···</p>

    <h1 class="title">晴天</h1>
    <p class="meta">周杰伦 <span class="dot">·</span> 叶惠美 <span class="dot">·</span> 2003</p>

    <div class="narration">
      <span class="seg past">天空忽然就晴了。</span>
      <span class="seg active">这是周杰伦的《晴天》，写给少年时的喜欢。</span>
      <span class="seg">钢琴前奏轻轻落下，像雨刚停。</span>
    </div>

    <hr class="lyric-divider">

    <div class="lyrics">
      <div class="ly past">故事的小黄花</div>
      <div class="ly past">从出生那年就飘着</div>
      <div class="ly active">童年的荡秋千</div>
      <div class="ly">随记忆一直晃到现在</div>
      <div class="ly">吹着前奏望着天空</div>
      <div class="ly">我想起花瓣试着掉落</div>
    </div>
  </main>

  <footer class="transport">
    <button class="ctrl" title="上一首">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zM9.5 12L20 6v12z"/></svg>
    </button>
    <button class="ctrl play" title="暂停">
      <svg viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
    </button>
    <button class="ctrl" title="下一首">
      <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM4 18l10.5-6L4 6z"/></svg>
    </button>
    <div class="progress">
      <span>03:21</span>
      <div class="progress-bar"><div class="progress-fill"></div></div>
      <span>04:58</span>
    </div>
  </footer>
</body>
</html>
