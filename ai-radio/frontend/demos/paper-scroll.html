<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo · 留白纸页</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont/lxgwwenkai-regular.css">
  <style>
    :root {
      --bg: #f5efe6;
      --text: #2c2218;
      --text-soft: #6f5d49;
      --text-fade: #b2a48e;
      --line: rgba(44, 34, 24, 0.1);
      --accent: #8b5a2b;
      --font: 'LXGW WenKai', "Songti SC", "Noto Serif SC", "Source Han Serif SC", serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.8;
      position: relative;
    }
    /* 纸张颗粒 */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='280' height='280'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.22 0 0 0 0 0.15 0 0 0 0 0.08 0 0 0 0.06 0'/></filter><rect width='280' height='280' filter='url(%23n)'/></svg>");
      opacity: 0.6;
      pointer-events: none;
      z-index: 0;
    }

    .demo-nav {
      position: fixed; top: 1.2rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 0.3rem;
      padding: 0.3rem 0.4rem;
      background: rgba(245, 239, 230, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid var(--line);
      border-radius: 999px;
      z-index: 100;
      font-size: 11px;
      letter-spacing: 0.05em;
    }
    .demo-nav a {
      padding: 0.3rem 0.8rem;
      color: var(--text-soft);
      text-decoration: none;
      border-radius: 999px;
      transition: all 0.15s;
      font-family: var(--font);
    }
    .demo-nav a:hover { color: var(--text); }
    .demo-nav a.active { background: var(--text); color: var(--bg); }

    .stage {
      position: relative; z-index: 1;
      max-width: 580px;
      margin: 0 auto;
      padding: 7rem 2rem 8rem;
    }

    .caption {
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.3em;
      color: var(--text-fade);
      margin: 0 0 0.6rem;
      text-transform: uppercase;
    }
    .title {
      text-align: center;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 0.1em;
      margin: 0 0 0.3rem;
    }
    .subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--text-soft);
      letter-spacing: 0.15em;
      margin: 0 0 4rem;
    }

    /* 装饰分割线 */
    .ornament {
      text-align: center;
      margin: 2.5rem 0;
      color: var(--text-fade);
      font-size: 14px;
      letter-spacing: 1em;
    }

    /* 旁白：散文体大字 */
    .narration {
      font-size: 19px;
      line-height: 2.1;
      letter-spacing: 0.04em;
      text-indent: 2em;
      margin: 0 0 2rem;
    }
    .narration .seg { transition: all 0.5s; color: var(--text-soft); opacity: 0.45; }
    .narration .seg.past { opacity: 0.3; }
    .narration .seg.active {
      opacity: 1;
      color: var(--text);
    }

    /* 歌词：等长居中诗体 */
    .lyrics {
      text-align: center;
      font-size: 17px;
      line-height: 2.3;
      letter-spacing: 0.1em;
    }
    .lyrics .ly { transition: all 0.5s; color: var(--text-soft); opacity: 0.45; }
    .lyrics .ly.past { opacity: 0.3; }
    .lyrics .ly.active {
      opacity: 1;
      color: var(--text);
      font-size: 19px;
      letter-spacing: 0.15em;
    }

    /* 底部 transport：极细线 + 简朴控件 */
    .transport {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: var(--bg);
      border-top: 1px solid var(--line);
      padding: 1rem 2rem;
      z-index: 50;
    }
    .transport-inner {
      max-width: 580px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }
    .ctrl {
      background: transparent;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 0.3rem 0.5rem;
      font-family: var(--font);
      font-size: 15px;
      letter-spacing: 0.1em;
      transition: color 0.15s;
    }
    .ctrl:hover { color: var(--accent); }
    .ctrl.play { font-size: 20px; }
    .progress {
      flex: 1; display: flex; align-items: center; gap: 0.8rem;
      font-size: 12px; color: var(--text-fade);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
    }
    .progress-bar {
      flex: 1; height: 1px;
      background: var(--line);
      position: relative;
    }
    .progress-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: var(--text);
      width: 42%;
    }

    @media (max-width: 640px) {
      .title { font-size: 24px; }
      .stage { padding: 6rem 1.4rem 7rem; }
      .narration { font-size: 17px; }
      .lyrics { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="demo-nav">
    <a href="paper-scroll.html" class="active">留白纸页</a>
    <a href="typewriter.html">终端打字机</a>
    <a href="magazine.html">杂志双栏</a>
    <a href="spotlight.html">卡拉OK</a>
    <a href="/">原版</a>
  </div>

  <main class="stage">
    <p class="caption">EPISODE 23</p>
    <h1 class="title">晴 天</h1>
    <p class="subtitle">周 杰 伦 · 叶 惠 美</p>

    <div class="ornament">· · ·</div>

    <p class="narration">
      <span class="seg past">天空忽然就晴了。</span>
      <span class="seg active">这是周杰伦的《晴天》，写给少年时的喜欢。</span>
      <span class="seg">钢琴前奏轻轻落下，像雨刚停。</span>
    </p>

    <div class="ornament">· · ·</div>

    <div class="lyrics">
      <div class="ly past">故事的小黄花</div>
      <div class="ly past">从出生那年就飘着</div>
      <div class="ly active">童年的荡秋千</div>
      <div class="ly">随记忆一直晃到现在</div>
      <div class="ly">吹着前奏望着天空</div>
      <div class="ly">我想起花瓣试着掉落</div>
    </div>
  </main>

  <footer class="transport">
    <div class="transport-inner">
      <button class="ctrl">◁</button>
      <button class="ctrl play">⏯</button>
      <button class="ctrl">▷</button>
      <div class="progress">
        <span>03:21</span>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <span>04:58</span>
      </div>
    </div>
  </footer>
</body>
</html>
