<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo · 终端打字机</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont/lxgwwenkai-regular.css">
  <style>
    :root {
      --bg: #0a0a0a;
      --text: #e0d4b8;
      --text-soft: #8a7d63;
      --text-fade: #4d4538;
      --accent: #ffb700;
      --accent-bright: #ffd866;
      --line: rgba(224, 212, 184, 0.12);
      --font-mono: 'JetBrains Mono', 'IBM Plex Mono', 'Cascadia Mono', 'Consolas', 'Menlo', 'Monaco', monospace;
      --font-cn: 'LXGW WenKai', monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.7;
      position: relative;
      font-size: 14px;
    }
    /* CRT 扫描线 */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 3px
      );
      pointer-events: none;
      z-index: 2;
      opacity: 0.4;
    }

    .demo-nav {
      position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 0;
      background: var(--bg);
      border: 1px solid var(--line);
      z-index: 100;
      font-size: 11px;
    }
    .demo-nav a {
      padding: 0.4rem 0.9rem;
      color: var(--text-soft);
      text-decoration: none;
      border-right: 1px solid var(--line);
      transition: all 0.15s;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .demo-nav a:last-child { border-right: none; }
    .demo-nav a:hover { color: var(--text); background: rgba(255, 183, 0, 0.06); }
    .demo-nav a.active {
      background: var(--accent);
      color: var(--bg);
    }

    .stage {
      position: relative; z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 2rem 7rem;
    }

    .env-line {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 0.55rem 0.4rem;
      margin: 3rem 0 2rem;
      font-size: 12px;
      color: var(--text-soft);
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.06em;
    }
    .env-item { display: inline-flex; align-items: center; gap: 0.4rem; }
    .env-item.right { color: var(--accent); }
    .env-sep { color: var(--text-fade); padding: 0 0.2rem; }

    /* 信息区 */
    .info-block {
      margin: 0 0 2rem;
    }
    .info-row { display: flex; gap: 1rem; margin-bottom: 0.25rem; font-size: 13px; }
    .info-key { color: var(--text-soft); width: 90px; }
    .info-val { color: var(--text); font-family: var(--font-cn), var(--font-mono); }

    /* 旁白：带光标 */
    .section-head {
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.2em;
      margin: 2rem 0 0.8rem;
      border-bottom: 1px dashed var(--text-fade);
      padding-bottom: 0.4rem;
    }
    .narration {
      font-family: var(--font-cn), var(--font-mono);
      font-size: 15px;
      line-height: 1.9;
      letter-spacing: 0.02em;
      padding-left: 1.5rem;
      position: relative;
    }
    .narration::before {
      content: ">";
      position: absolute; left: 0;
      color: var(--accent);
    }
    .narration .seg { display: block; transition: all 0.3s; color: var(--text-soft); opacity: 0.5; }
    .narration .seg.past { opacity: 0.3; }
    .narration .seg.active {
      opacity: 1;
      color: var(--text);
      position: relative;
    }
    .narration .seg.active::after {
      content: "█";
      animation: blink 1s steps(2) infinite;
      color: var(--accent);
      margin-left: 3px;
      font-size: 12px;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    /* 歌词：终端列表 */
    .lyrics {
      font-family: var(--font-cn), var(--font-mono);
      font-size: 15px;
      line-height: 1.9;
      padding-left: 1.5rem;
      position: relative;
    }
    .lyrics::before {
      content: "$";
      position: absolute; left: 0; top: 0;
      color: var(--accent);
    }
    .lyrics .ly {
      transition: all 0.3s;
      color: var(--text-soft);
      opacity: 0.5;
    }
    .lyrics .ly.past { opacity: 0.3; }
    .lyrics .ly.past::before { content: "  "; }
    .lyrics .ly.active {
      opacity: 1;
      color: var(--accent-bright);
    }
    .lyrics .ly.active::before {
      content: "▸ ";
      color: var(--accent);
    }

    /* 底部 transport：ASCII 风 */
    .transport {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: var(--bg);
      border-top: 1px solid var(--line);
      padding: 0.7rem 2rem;
      z-index: 50;
      font-family: var(--font-mono);
    }
    .transport-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 12px;
      color: var(--text-soft);
    }
    .ctrl {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text);
      cursor: pointer;
      padding: 0.3rem 0.7rem;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      transition: all 0.15s;
    }
    .ctrl:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .ctrl.play {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 700;
    }
    .progress {
      flex: 1; display: flex; align-items: center; gap: 0.6rem;
      font-variant-numeric: tabular-nums;
    }
    .progress-bar {
      flex: 1;
      font-family: var(--font-mono);
      color: var(--text-fade);
      font-size: 12px;
      letter-spacing: -1px;
    }
    .progress-bar .filled { color: var(--accent); }

    @media (max-width: 640px) {
      .stage { padding: 4rem 1.2rem 6rem; }
      .ascii-title { font-size: 8px; }
    }
  </style>
</head>
<body>
  <div class="demo-nav">
    <a href="paper-scroll.html">留白纸页</a>
    <a href="typewriter.html" class="active">打字机</a>
    <a href="magazine.html">杂志双栏</a>
    <a href="spotlight.html">卡拉OK</a>
    <a href="/">原版</a>
  </div>

  <main class="stage">
    <div class="env-line">
      <span class="env-item">[ 北京 · 朝阳 ]</span>
      <span class="env-sep">·</span>
      <span class="env-item">☀ 22°C  SUNNY</span>
      <span class="env-sep">·</span>
      <span class="env-item right">● 12:43  LIVE</span>
    </div>

    <div class="info-block">
      <div class="info-row"><span class="info-key">TRACK     :</span><span class="info-val">晴天</span></div>
      <div class="info-row"><span class="info-key">ARTIST    :</span><span class="info-val">周杰伦</span></div>
      <div class="info-row"><span class="info-key">ALBUM     :</span><span class="info-val">叶惠美 (2003)</span></div>
      <div class="info-row"><span class="info-key">MODE      :</span><span class="info-val">song_intro</span></div>
    </div>

    <div class="section-head">// NARRATION</div>
    <div class="narration">
      <span class="seg past">天空忽然就晴了。</span>
      <span class="seg active">这是周杰伦的《晴天》，写给少年时的喜欢。</span>
      <span class="seg">钢琴前奏轻轻落下，像雨刚停。</span>
    </div>

    <div class="section-head">// LYRICS</div>
    <div class="lyrics">
      <div class="ly past">故事的小黄花</div>
      <div class="ly past">从出生那年就飘着</div>
      <div class="ly active">童年的荡秋千</div>
      <div class="ly">随记忆一直晃到现在</div>
      <div class="ly">吹着前奏望着天空</div>
      <div class="ly">我想起花瓣试着掉落</div>
    </div>
  </main>

  <footer class="transport">
    <div class="transport-inner">
      <button class="ctrl">[ &lt;&lt; ]</button>
      <button class="ctrl play">[ PAUSE ]</button>
      <button class="ctrl">[ &gt;&gt; ]</button>
      <div class="progress">
        <span>03:21</span>
        <span class="progress-bar"><span class="filled">━━━━━━━━━━━━</span>━━━━━━━━━━━━━━━━━</span>
        <span>04:58</span>
      </div>
      <button class="ctrl">[ CFG ]</button>
    </div>
  </footer>
</body>
</html>
