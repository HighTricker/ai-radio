<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo · 光斑漂移（舞台级）</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont/lxgwwenkai-regular.css">
  <style>
    :root {
      --text: #f3eee7;
      --text-soft: rgba(243, 238, 231, 0.6);
      --text-fade: rgba(243, 238, 231, 0.38);
      --accent: #ffd866;
      --line: rgba(255, 255, 255, 0.08);
      --font: 'JetBrains Mono', 'IBM Plex Mono', 'LXGW WenKai', monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      overflow: hidden;
      position: relative;
      background: #0a0a14;
    }
    /* === 大尺寸光斑（按舞台比例放大） === */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.75;
    }
    .orb-1 {
      width: 720px; height: 720px;
      background: radial-gradient(circle, #c084fc 0%, transparent 70%);
      animation: drift1 22s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 640px; height: 640px;
      background: radial-gradient(circle, #f472b6 0%, transparent 70%);
      animation: drift2 28s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 580px; height: 580px;
      background: radial-gradient(circle, #fbbf24 0%, transparent 70%);
      animation: drift3 25s ease-in-out infinite alternate;
    }
    @keyframes drift1 {
      0% { transform: translate(-30vw, -30vh); }
      100% { transform: translate(40vw, 35vh); }
    }
    @keyframes drift2 {
      0% { transform: translate(35vw, -20vh); }
      100% { transform: translate(-25vw, 30vh); }
    }
    @keyframes drift3 {
      0% { transform: translate(0vw, 30vh); }
      100% { transform: translate(20vw, -25vh); }
    }

    .demo-nav {
      position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
      display: flex;
      padding: 0.3rem 0.4rem;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      border-radius: 999px;
      z-index: 100;
      font-size: 11px;
      gap: 0.3rem;
    }
    .demo-nav a {
      padding: 0.3rem 0.8rem;
      color: var(--text-soft);
      text-decoration: none;
      border-radius: 999px;
      letter-spacing: 0.04em;
    }
    .demo-nav a:hover { color: var(--text); }
    .demo-nav a.active { background: var(--accent); color: #0a0a14; }

    /* === 舞台级卡片：撑满视口 === */
    .card {
      position: relative;
      z-index: 10;
      width: min(94vw, 1200px);
      height: min(90vh, 880px);
      padding: 3rem 3rem 2.2rem;
      background: rgba(10, 10, 20, 0.5);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 36px;
      box-shadow:
        0 48px 140px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.14);
      display: flex;
      flex-direction: column;
    }
    .env-line {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 0.85rem 0.5rem;
      font-size: 14px;
      color: var(--accent);
      display: flex;
      justify-content: space-between;
      letter-spacing: 0.08em;
    }
    .env-sep { opacity: 0.5; padding: 0 0.2rem; }
    .info-block { margin: 2.4rem 0 1.8rem; }
    .info-row {
      display: grid;
      grid-template-columns: 4.5em 0.6em 1fr;
      margin-bottom: 0.55rem;
      font-size: 17px;
      align-items: baseline;
    }
    .info-key { color: var(--text-soft); letter-spacing: 0.35em; font-size: 14px; }
    .info-sep { color: var(--text-fade); }
    .feedback-row { display: flex; gap: 0.7rem; margin-bottom: 1.8rem; }
    .btn-mini {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      color: var(--text-soft);
      padding: 0.5rem 1.1rem;
      font-size: 13px;
      font-family: var(--font);
      letter-spacing: 0.1em;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-mini:hover { color: var(--accent); border-color: var(--accent); }

    .stream {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 0.75rem;
      padding: 1rem 0;
      mask-image: linear-gradient(180deg, transparent 0%, #000 18%, #000 100%);
      -webkit-mask-image: linear-gradient(180deg, transparent 0%, #000 18%, #000 100%);
    }
    .line {
      font-size: 18px;
      line-height: 1.75;
      color: var(--text-soft);
      opacity: 0.5;
      padding-left: 1.8rem;
      position: relative;
    }
    .line.is-narration { font-style: italic; }
    .line.is-narration::before {
      content: ">"; position: absolute; left: 0; color: var(--accent); font-style: normal;
    }
    .line.is-lyric::before {
      content: "$"; position: absolute; left: 0; color: var(--accent);
    }
    .line.past { opacity: 0.3; }
    .line.active {
      opacity: 1;
      color: var(--text);
      font-size: 20px;
    }
    .line.active::after {
      content: "█";
      animation: blink 1s steps(2) infinite;
      color: var(--accent);
      margin-left: 6px;
      font-size: 16px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .transport {
      margin-top: 1.5rem;
      padding-top: 1.4rem;
      border-top: 1px solid var(--line);
      display: flex; align-items: center; gap: 0.7rem;
    }
    .ctrl {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 0.6rem 1.1rem;
      font-family: var(--font);
      font-size: 13px;
      letter-spacing: 0.08em;
      border-radius: 8px;
      cursor: pointer;
    }
    .ctrl.play {
      background: var(--accent);
      color: #0a0a14;
      border-color: var(--accent);
      display: inline-flex; align-items: center; justify-content: center;
      width: 50px; height: 42px; padding: 0;
    }
    .ctrl.play svg { fill: currentColor; }
    .progress {
      flex: 1; display: flex; align-items: center; gap: 0.7rem;
      font-size: 12px; color: var(--text-fade);
      font-variant-numeric: tabular-nums;
    }
    .progress-bar {
      flex: 1; height: 3px;
      background: rgba(255,255,255,0.1);
      position: relative;
      border-radius: 2px;
    }
    .progress-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 42%;
      background: var(--accent);
      box-shadow: 0 0 12px rgba(255,216,102,0.65);
      border-radius: 2px;
    }
    .cfg-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #0a0a14;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(255, 216, 102, 0.6);
      transition: transform 0.2s;
    }
    .cfg-btn:hover { transform: rotate(60deg); }

    @media (max-width: 760px) {
      .card { padding: 1.5rem 1.3rem 1.2rem; border-radius: 24px; }
      .env-line { font-size: 12px; }
      .info-row { font-size: 14px; grid-template-columns: 3em 0.6em 1fr; }
      .info-key { font-size: 12px; }
      .line { font-size: 14px; padding-left: 1.3rem; }
      .line.active { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="demo-nav">
    <a href="card-drift.html">小</a>
    <a href="card-drift-large.html">中</a>
    <a href="card-drift-xl.html" class="active">舞台级</a>
    <a href="/">原版</a>
  </div>

  <div class="card">
    <div class="env-line">
      <span>北京</span><span class="env-sep">·</span>
      <span>🌧 阵雨 21°</span><span class="env-sep">·</span>
      <span>● 18:21 现场</span>
    </div>
    <div class="info-block">
      <div class="info-row"><span class="info-key">曲目</span><span class="info-sep">:</span><span>晴天</span></div>
      <div class="info-row"><span class="info-key">歌手</span><span class="info-sep">:</span><span>周杰伦</span></div>
      <div class="info-row"><span class="info-key">模式</span><span class="info-sep">:</span><span>歌曲介绍</span></div>
    </div>
    <div class="feedback-row">
      <button class="btn-mini">[ ♥ 喜欢 ]</button>
      <button class="btn-mini">[ ✕ 跳过 ]</button>
    </div>
    <div class="stream">
      <div class="line is-narration past">天空忽然就晴了。</div>
      <div class="line is-narration past">这是周杰伦的《晴天》。</div>
      <div class="line is-narration past">写给少年时的喜欢。</div>
      <div class="line is-narration past">钢琴前奏轻轻落下，像雨刚停。</div>
      <div class="line is-lyric past">故事的小黄花</div>
      <div class="line is-lyric past">从出生那年就飘着</div>
      <div class="line is-lyric past">童年的荡秋千</div>
      <div class="line is-lyric past">随记忆一直晃到现在</div>
      <div class="line is-lyric active">吹着前奏望着天空</div>
    </div>
    <div class="transport">
      <button class="ctrl">&lt;&lt;</button>
      <button class="ctrl play">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 5h4v14H6zM14 5h4v14h-4z" fill="currentColor"/></svg>
      </button>
      <button class="ctrl">&gt;&gt;</button>
      <div class="progress">
        <span>03:21</span>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <span>04:58</span>
      </div>
      <button class="cfg-btn">⚙</button>
    </div>
  </div>
</body>
</html>
