<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo · 多色流动渐变</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont/lxgwwenkai-regular.css">
  <style>
    :root {
      --text: #ffffff;
      --text-soft: rgba(255, 255, 255, 0.7);
      --text-fade: rgba(255, 255, 255, 0.45);
      --accent: #ffd866;
      --line: rgba(255, 255, 255, 0.1);
      --font: 'JetBrains Mono', 'IBM Plex Mono', 'LXGW WenKai', monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow: hidden;
      position: relative;
      background: #1a1224;
    }
    /* === 多色相流动渐变 === */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background: linear-gradient(
        135deg,
        #ff6b9d 0%,
        #c06c84 14%,
        #6c5b7b 28%,
        #355c7d 42%,
        #1a4480 56%,
        #355c7d 70%,
        #6c5b7b 84%,
        #ff6b9d 100%
      );
      background-size: 400% 400%;
      animation: flow 25s ease-in-out infinite;
      z-index: 0;
      opacity: 0.85;
    }
    @keyframes flow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    /* 第二层柔化 */
    body::after {
      content: "";
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 30% 40%, rgba(255, 107, 157, 0.3) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 70% 60%, rgba(53, 92, 125, 0.4) 0%, transparent 60%);
      filter: blur(40px);
      animation: drift 20s ease-in-out infinite alternate;
      z-index: 1;
      pointer-events: none;
    }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to { transform: translate(-5%, 3%); }
    }

    .demo-nav {
      position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
      display: flex;
      padding: 0.3rem 0.4rem;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      border-radius: 999px;
      z-index: 100;
      font-size: 11px;
      gap: 0.3rem;
    }
    .demo-nav a {
      padding: 0.3rem 0.8rem;
      color: var(--text-soft);
      text-decoration: none;
      border-radius: 999px;
      letter-spacing: 0.04em;
    }
    .demo-nav a:hover { color: var(--text); }
    .demo-nav a.active { background: var(--accent); color: #1a1224; }

    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      min-height: 600px;
      padding: 1.8rem 1.6rem 1.4rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(32px) saturate(160%);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      box-shadow:
        0 30px 90px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
    }
    .env-line {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 0.5rem 0.3rem;
      font-size: 11px;
      color: var(--accent);
      display: flex;
      justify-content: space-between;
      letter-spacing: 0.06em;
    }
    .env-sep { opacity: 0.55; padding: 0 0.15rem; }
    .info-block { margin: 1.4rem 0 1.2rem; }
    .info-row {
      display: grid;
      grid-template-columns: 3em 0.6em 1fr;
      margin-bottom: 0.3rem;
      font-size: 13px;
      align-items: baseline;
    }
    .info-key { color: var(--text-soft); letter-spacing: 0.25em; font-size: 12px; }
    .info-sep { color: var(--text-fade); }
    .feedback-row { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; }
    .btn-mini {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: var(--text-soft);
      padding: 0.3rem 0.7rem;
      font-size: 10px;
      font-family: var(--font);
      letter-spacing: 0.1em;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-mini:hover { color: var(--accent); border-color: var(--accent); }

    .stream {
      flex: 1; min-height: 200px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 0.45rem;
      padding: 0.5rem 0;
      mask-image: linear-gradient(180deg, transparent 0%, #000 25%, #000 100%);
      -webkit-mask-image: linear-gradient(180deg, transparent 0%, #000 25%, #000 100%);
    }
    .line {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-soft);
      opacity: 0.5;
      padding-left: 1.3rem;
      position: relative;
    }
    .line.is-narration { font-style: italic; }
    .line.is-narration::before {
      content: ">"; position: absolute; left: 0; color: var(--accent); font-style: normal;
    }
    .line.is-lyric::before {
      content: "$"; position: absolute; left: 0; color: var(--accent);
    }
    .line.past { opacity: 0.35; }
    .line.active {
      opacity: 1;
      color: var(--text);
      font-size: 15.5px;
    }
    .line.active::after {
      content: "█";
      animation: blink 1s steps(2) infinite;
      color: var(--accent);
      margin-left: 4px;
      font-size: 12px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .transport {
      margin-top: 1rem;
      padding-top: 0.9rem;
      border-top: 1px solid var(--line);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .ctrl {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 0.4rem 0.7rem;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 0.08em;
      border-radius: 4px;
      cursor: pointer;
    }
    .ctrl.play {
      background: var(--accent);
      color: #1a1224;
      border-color: var(--accent);
      display: inline-flex; align-items: center; justify-content: center;
      width: 38px; height: 30px; padding: 0;
    }
    .ctrl.play svg { fill: currentColor; }
    .progress {
      flex: 1; display: flex; align-items: center; gap: 0.5rem;
      font-size: 10px; color: var(--text-fade);
      font-variant-numeric: tabular-nums;
    }
    .progress-bar {
      flex: 1; height: 2px;
      background: rgba(255,255,255,0.15);
      position: relative;
      border-radius: 2px;
    }
    .progress-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 42%;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(255,216,102,0.6);
      border-radius: 2px;
    }
    .cfg-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #1a1224;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 0 14px rgba(255,216,102,0.55);
      transition: transform 0.2s;
    }
    .cfg-btn:hover { transform: rotate(60deg); }
  </style>
</head>
<body>
  <div class="demo-nav">
    <a href="card-purple.html">紫色光晕</a>
    <a href="card-gradient.html" class="active">多色渐变</a>
    <a href="card-pulse.html">琥珀脉动</a>
    <a href="card-drift.html">光斑漂移</a>
    <a href="/">原版</a>
  </div>

  <div class="card">
    <div class="env-line">
      <span>北京</span><span class="env-sep">·</span>
      <span>🌧 阵雨 21°</span><span class="env-sep">·</span>
      <span>● 18:21 现场</span>
    </div>
    <div class="info-block">
      <div class="info-row"><span class="info-key">曲目</span><span class="info-sep">:</span><span>晴天</span></div>
      <div class="info-row"><span class="info-key">歌手</span><span class="info-sep">:</span><span>周杰伦</span></div>
      <div class="info-row"><span class="info-key">模式</span><span class="info-sep">:</span><span>歌曲介绍</span></div>
    </div>
    <div class="feedback-row">
      <button class="btn-mini">[ ♥ 喜欢 ]</button>
      <button class="btn-mini">[ ✕ 跳过 ]</button>
    </div>
    <div class="stream">
      <div class="line is-narration past">天空忽然就晴了。</div>
      <div class="line is-narration past">这是周杰伦的《晴天》。</div>
      <div class="line is-lyric past">故事的小黄花</div>
      <div class="line is-lyric past">从出生那年就飘着</div>
      <div class="line is-lyric active">童年的荡秋千</div>
    </div>
    <div class="transport">
      <button class="ctrl">&lt;&lt;</button>
      <button class="ctrl play">
        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M6 5h4v14H6zM14 5h4v14h-4z" fill="currentColor"/></svg>
      </button>
      <button class="ctrl">&gt;&gt;</button>
      <div class="progress">
        <span>03:21</span>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <span>04:58</span>
      </div>
      <button class="cfg-btn">⚙</button>
    </div>
  </div>
</body>
</html>
