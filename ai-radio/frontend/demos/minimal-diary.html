<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo · 极简日记</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont/lxgwwenkai-regular.css">
  <style>
    :root {
      --bg: #ffffff;
      --text: #292827;
      --text-soft: #6b6760;
      --text-fade: #a89e96;
      --border: #dcd7d3;
      --button-bg: #e9e5dd;
      --accent: #cbb7fb;
      --accent-link: #714cb6;
      --font: 'LXGW WenKai', 'Super Sans VF', system-ui, -apple-system, "Segoe UI", "PingFang SC", serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      font-size: 16px;
      font-weight: 460;
    }

    .demo-nav {
      position: fixed; top: 1.2rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 0.4rem;
      padding: 0.35rem 0.4rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      z-index: 100;
      font-size: 12px;
    }
    .demo-nav a {
      padding: 0.3rem 0.9rem;
      color: var(--text-soft);
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.15s;
    }
    .demo-nav a:hover { color: var(--text); }
    .demo-nav a.active {
      background: var(--text);
      color: var(--bg);
    }

    /* 顶部信息条 */
    .top-bar {
      max-width: 720px;
      margin: 0 auto;
      padding: 5.5rem 2rem 0;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 13px;
      color: var(--text-fade);
      letter-spacing: 0.04em;
    }
    .brand {
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .env { display: flex; gap: 0.6rem; align-items: center; }
    .env .sep { color: var(--border); }

    .stage {
      max-width: 720px;
      margin: 0 auto;
      padding: 2.5rem 2rem 9rem;
    }

    /* 小海报 + 元数据，左对齐 */
    .now-playing {
      display: flex;
      gap: 1.4rem;
      align-items: flex-start;
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    .poster {
      width: 96px; height: 96px;
      border-radius: 8px;
      background: linear-gradient(135deg, #f3e5d5 0%, #d4b896 50%, #a48569 100%);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .poster::after {
      content: "♪";
      position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 32px;
      color: rgba(255,255,255,0.55);
      font-family: serif;
    }
    .now-meta { flex: 1; padding-top: 0.1rem; }
    .title {
      font-size: 36px;
      font-weight: 540;
      line-height: 1.05;
      letter-spacing: -0.01em;
      margin: 0 0 0.55rem;
    }
    .artist {
      font-size: 16px;
      color: var(--text-soft);
      margin: 0 0 0.3rem;
    }
    .album {
      font-size: 13px;
      color: var(--text-fade);
      margin: 0;
      letter-spacing: 0.02em;
    }
    .actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .action-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-soft);
      padding: 0.35rem 0.85rem;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s;
    }
    .action-btn:hover { border-color: var(--text); color: var(--text); }
    .action-btn.liked {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--text);
    }

    /* 旁白段 */
    .narration-block {
      margin: 0 0 3rem;
    }
    .section-label {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-fade);
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .narration {
      font-size: 17px;
      line-height: 1.85;
      color: var(--text-soft);
      letter-spacing: 0.005em;
    }
    .narration .seg { display: block; transition: all 0.4s; opacity: 0.5; }
    .narration .seg.past { opacity: 0.3; }
    .narration .seg.active {
      opacity: 1;
      color: var(--text);
      font-weight: 540;
    }

    /* 歌词 */
    .lyrics-block { margin: 0; }
    .lyrics {
      font-size: 18px;
      line-height: 2;
      color: var(--text-soft);
    }
    .lyrics .ly { transition: all 0.4s; opacity: 0.5; }
    .lyrics .ly.past { opacity: 0.3; }
    .lyrics .ly.active {
      opacity: 1;
      color: var(--text);
      font-weight: 540;
    }

    /* 底部 transport：极简边线 */
    .transport {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      z-index: 50;
    }
    .transport-inner {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .ctrl {
      background: transparent;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 0.4rem;
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .ctrl:hover { background: var(--button-bg); }
    .ctrl.play {
      background: var(--button-bg);
      width: 40px; height: 40px;
      border-radius: 8px;
    }
    .ctrl.play:hover { background: #ddd6c9; }
    .ctrl svg { width: 16px; height: 16px; fill: currentColor; }

    .progress {
      flex: 1; display: flex; align-items: center; gap: 0.8rem;
      font-size: 12px; color: var(--text-fade);
      font-variant-numeric: tabular-nums;
    }
    .progress-bar {
      flex: 1; height: 3px;
      background: var(--border);
      position: relative;
      border-radius: 2px;
    }
    .progress-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: var(--accent-link);
      width: 42%;
      border-radius: 2px;
    }
    .progress-fill::after {
      content: "";
      position: absolute; right: -4px; top: 50%;
      transform: translateY(-50%);
      width: 9px; height: 9px;
      background: var(--accent-link);
      border-radius: 50%;
    }

    .config-trigger {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-soft);
      width: 36px; height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      font-family: var(--font);
    }
    .config-trigger:hover { border-color: var(--text); color: var(--text); }

    @media (max-width: 640px) {
      .now-playing { flex-direction: column; gap: 1rem; }
      .poster { width: 80px; height: 80px; }
      .title { font-size: 28px; }
      .stage { padding: 2rem 1.2rem 7rem; }
      .top-bar { padding: 5rem 1.2rem 0; }
    }
  </style>
</head>
<body>
  <div class="demo-nav">
    <a href="warm-study.html">暖光书房</a>
    <a href="deep-night.html">极夜深空</a>
    <a href="minimal-diary.html" class="active">极简日记</a>
    <a href="/">原版</a>
  </div>

  <div class="top-bar">
    <span class="brand">Claudio</span>
    <span class="env">
      <span>北京</span>
      <span class="sep">·</span>
      <span>☀ 22°</span>
      <span class="sep">·</span>
      <span>12:43</span>
    </span>
  </div>

  <main class="stage">
    <section class="now-playing">
      <div class="poster"></div>
      <div class="now-meta">
        <h1 class="title">晴天</h1>
        <p class="artist">周杰伦</p>
        <p class="album">叶惠美 · 2003</p>
        <div class="actions">
          <button class="action-btn liked">♥ 喜欢</button>
          <button class="action-btn">✕ 不喜欢</button>
        </div>
      </div>
    </section>

    <section class="narration-block">
      <div class="section-label">主播旁白</div>
      <div class="narration">
        <span class="seg past">天空忽然就晴了。</span>
        <span class="seg active">这是周杰伦的《晴天》，写给少年时的喜欢。</span>
        <span class="seg">钢琴前奏轻轻落下，像雨刚停。</span>
      </div>
    </section>

    <section class="lyrics-block">
      <div class="section-label">歌词</div>
      <div class="lyrics">
        <div class="ly past">故事的小黄花</div>
        <div class="ly past">从出生那年就飘着</div>
        <div class="ly active">童年的荡秋千</div>
        <div class="ly">随记忆一直晃到现在</div>
        <div class="ly">吹着前奏望着天空</div>
        <div class="ly">我想起花瓣试着掉落</div>
      </div>
    </section>
  </main>

  <footer class="transport">
    <div class="transport-inner">
      <button class="ctrl" title="上一首">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zM9.5 12L20 6v12z"/></svg>
      </button>
      <button class="ctrl play" title="暂停">
        <svg viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
      <button class="ctrl" title="下一首">
        <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM4 18l10.5-6L4 6z"/></svg>
      </button>
      <div class="progress">
        <span>03:21</span>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <span>04:58</span>
      </div>
      <button class="config-trigger" title="设置">⚙</button>
    </div>
  </footer>
</body>
</html>
