<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo · 暖光书房</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont/lxgwwenkai-regular.css">
  <style>
    :root {
      --bg: #f5efe6;
      --bg-deep: #ebe2d4;
      --text: #3d2e1f;
      --text-soft: #7a6952;
      --text-fade: #b3a48b;
      --accent: #8b6f47;
      --line: rgba(61, 46, 31, 0.12);
      --font: 'LXGW WenKai', "Songti SC", "Noto Serif SC", "PingFang SC", serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      /* 颗粒纸纹 */
      background-image:
        radial-gradient(circle at 20% 30%, rgba(139, 111, 71, 0.04) 0%, transparent 60%),
        radial-gradient(circle at 80% 70%, rgba(139, 111, 71, 0.05) 0%, transparent 50%);
      background-attachment: fixed;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.24 0 0 0 0 0.18 0 0 0 0 0.12 0 0 0 0.07 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    .demo-nav {
      position: fixed; top: 1.2rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 0.4rem;
      padding: 0.35rem 0.4rem;
      background: rgba(245, 239, 230, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--line);
      border-radius: 999px;
      z-index: 100;
      font-size: 12px;
    }
    .demo-nav a {
      padding: 0.3rem 0.9rem;
      color: var(--text-soft);
      text-decoration: none;
      border-radius: 999px;
      transition: all 0.2s;
    }
    .demo-nav a:hover { color: var(--text); }
    .demo-nav a.active {
      background: var(--text);
      color: var(--bg);
    }

    .stage {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 6.5rem 2rem 9rem;
      text-align: center;
    }

    /* 圆形黑胶海报 */
    .vinyl {
      width: 240px; height: 240px;
      margin: 0 auto 2.8rem;
      position: relative;
    }
    .vinyl-disc {
      width: 100%; height: 100%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 28%, #c89968 0%, #8b5a2b 35%, #5a3920 75%, #3a2310 100%);
      box-shadow:
        0 8px 32px rgba(61, 46, 31, 0.25),
        inset 0 0 0 3px rgba(245, 239, 230, 0.35),
        inset 0 0 60px rgba(0, 0, 0, 0.35);
      position: relative;
      animation: vinyl-spin 16s linear infinite;
    }
    /* 黑胶纹路 */
    .vinyl-disc::before {
      content: "";
      position: absolute; inset: 12%;
      border-radius: 50%;
      background: repeating-radial-gradient(
        circle,
        rgba(0,0,0,0.18) 0px,
        rgba(0,0,0,0.18) 1px,
        transparent 1px,
        transparent 4px
      );
    }
    /* 中心圆 */
    .vinyl-disc::after {
      content: "";
      position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 28%; height: 28%;
      border-radius: 50%;
      background: radial-gradient(circle, #d4a373 0%, #a87c4c 100%);
      box-shadow: inset 0 0 0 4px rgba(245, 239, 230, 0.6);
    }
    @keyframes vinyl-spin {
      to { transform: rotate(360deg); }
    }

    .title {
      font-size: 56px;
      font-weight: 400;
      margin: 0 0 0.8rem;
      letter-spacing: 0.4em;
      line-height: 1.1;
      text-indent: 0.4em;
    }
    .artist {
      font-size: 14px;
      color: var(--text-soft);
      letter-spacing: 0.2em;
      margin: 0 0 0.6rem;
    }
    .album {
      font-size: 12px;
      color: var(--text-fade);
      letter-spacing: 0.15em;
      margin: 0 0 3rem;
    }

    .thin-line {
      width: 60px; height: 1px;
      background: var(--line);
      margin: 2rem auto;
      border: none;
    }

    .narration {
      font-size: 16px;
      line-height: 2;
      color: var(--text-soft);
      letter-spacing: 0.03em;
      margin: 0 0 2rem;
    }
    .narration .seg { display: block; transition: all 0.4s; opacity: 0.45; }
    .narration .seg.past { opacity: 0.3; }
    .narration .seg.active {
      opacity: 1;
      color: var(--text);
      font-size: 17px;
    }
    .narration .quote-l, .narration .quote-r { color: var(--accent); }

    .lyrics {
      font-size: 17px;
      line-height: 2.1;
    }
    .lyrics .ly { transition: all 0.4s; color: var(--text-soft); opacity: 0.5; }
    .lyrics .ly.past { opacity: 0.3; }
    .lyrics .ly.active {
      opacity: 1;
      color: var(--text);
      font-size: 19px;
      letter-spacing: 0.05em;
    }

    /* 底部老式 transport */
    .transport {
      position: fixed;
      left: 50%; bottom: 1.5rem;
      transform: translateX(-50%);
      width: calc(100% - 3rem);
      max-width: 600px;
      padding: 1rem 1.5rem;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 50;
      box-shadow: 0 4px 20px rgba(61, 46, 31, 0.08);
    }
    .ctrl {
      background: transparent; border: none;
      color: var(--text); cursor: pointer;
      font-family: var(--font);
      font-size: 16px;
      padding: 0.3rem 0.5rem;
      letter-spacing: 0.1em;
    }
    .ctrl.play { font-size: 22px; }
    .ctrl:hover { color: var(--accent); }
    .progress {
      flex: 1; display: flex; align-items: center; gap: 0.8rem;
      font-size: 12px; color: var(--text-fade);
      font-variant-numeric: tabular-nums;
    }
    .progress-bar {
      flex: 1; height: 2px;
      background: var(--line);
      position: relative;
      border-radius: 2px;
    }
    .progress-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: var(--accent);
      width: 42%;
      border-radius: 2px;
    }
    .progress-fill::after {
      content: "";
      position: absolute; right: -3px; top: 50%;
      transform: translateY(-50%);
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
    }

    .corner-info {
      position: fixed; top: 1.4rem; right: 1.8rem;
      font-size: 12px; color: var(--text-fade);
      letter-spacing: 0.1em;
      z-index: 100;
    }
    .corner-actions {
      position: fixed; top: 1.4rem; left: 1.8rem;
      font-size: 14px; color: var(--text-soft);
      letter-spacing: 0.05em;
      z-index: 100;
    }

    @media (max-width: 640px) {
      .vinyl { width: 180px; height: 180px; }
      .title { font-size: 40px; letter-spacing: 0.3em; }
      .stage { padding: 6rem 1.5rem 8rem; }
    }
  </style>
</head>
<body>
  <div class="demo-nav">
    <a href="warm-study.html" class="active">暖光书房</a>
    <a href="deep-night.html">极夜深空</a>
    <a href="minimal-diary.html">极简日记</a>
    <a href="/">原版</a>
  </div>

  <div class="corner-actions">Claudio</div>
  <div class="corner-info">12:43 · ☀ 22°</div>

  <main class="stage">
    <div class="vinyl">
      <div class="vinyl-disc"></div>
    </div>

    <h1 class="title">晴 天</h1>
    <p class="artist">· 周 杰 伦 ·</p>
    <p class="album">叶惠美 · 2003</p>

    <p class="narration">
      <span class="seg past">天空忽然就晴了。</span>
      <span class="seg active"><span class="quote-l">「</span>这是周杰伦的《晴天》，写给少年时的喜欢<span class="quote-r">」</span></span>
      <span class="seg">钢琴前奏轻轻落下，像雨刚停。</span>
    </p>

    <hr class="thin-line">

    <div class="lyrics">
      <div class="ly past">故事的小黄花</div>
      <div class="ly past">从出生那年就飘着</div>
      <div class="ly active">童年的荡秋千</div>
      <div class="ly">随记忆一直晃到现在</div>
      <div class="ly">吹着前奏望着天空</div>
      <div class="ly">我想起花瓣试着掉落</div>
    </div>
  </main>

  <footer class="transport">
    <button class="ctrl">◁◁</button>
    <button class="ctrl play">⏯</button>
    <button class="ctrl">▷▷</button>
    <div class="progress">
      <span>03:21</span>
      <div class="progress-bar"><div class="progress-fill"></div></div>
      <span>04:58</span>
    </div>
  </footer>
</body>
</html>
