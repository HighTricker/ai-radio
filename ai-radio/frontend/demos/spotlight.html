<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo · 卡拉 OK 聚光</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont/lxgwwenkai-regular.css">
  <style>
    :root {
      --bg-1: #14122a;
      --bg-2: #0a0816;
      --text: #f3eee7;
      --text-soft: rgba(243, 238, 231, 0.6);
      --text-fade: rgba(243, 238, 231, 0.3);
      --text-dim: rgba(243, 238, 231, 0.18);
      --accent: #cbb7fb;
      --line: rgba(255, 255, 255, 0.08);
      --font: 'LXGW WenKai', "Source Han Serif SC", "Songti SC", serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }
    /* 聚光灯 */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background: radial-gradient(
        ellipse 70% 60% at 50% 45%,
        rgba(203, 183, 251, 0.1) 0%,
        rgba(203, 183, 251, 0.04) 40%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 1;
    }

    .demo-nav {
      position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 0.3rem;
      padding: 0.3rem 0.4rem;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      z-index: 100;
      font-size: 11px;
      letter-spacing: 0.05em;
    }
    .demo-nav a {
      padding: 0.3rem 0.8rem;
      color: var(--text-soft);
      text-decoration: none;
      border-radius: 999px;
      transition: all 0.15s;
    }
    .demo-nav a:hover { color: var(--text); }
    .demo-nav a.active { background: var(--accent); color: var(--bg-2); }

    /* 角落次要信息 */
    .corner-tl {
      position: fixed; top: 1.4rem; left: 1.8rem;
      font-size: 11px;
      color: var(--text-fade);
      letter-spacing: 0.25em;
      z-index: 50;
      text-transform: uppercase;
    }
    .corner-tr {
      position: fixed; top: 1.4rem; right: 1.8rem;
      font-size: 11px;
      color: var(--text-fade);
      letter-spacing: 0.2em;
      z-index: 50;
      text-transform: uppercase;
    }

    /* 主舞台：全屏 spotlight */
    .stage {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8rem 2rem 9rem;
      text-align: center;
    }

    /* 当前块：聚焦的语句（旁白 or 歌词） */
    .focus-area {
      max-width: 900px;
      width: 100%;
    }

    .stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    /* 行：远 → 近渐进字号和明度 */
    .line {
      transition: all 0.5s ease;
      letter-spacing: 0.05em;
      font-weight: 400;
    }
    .line.far-2 {
      font-size: 18px;
      color: var(--text-dim);
      opacity: 0.5;
    }
    .line.far-1 {
      font-size: 22px;
      color: var(--text-fade);
      opacity: 0.6;
    }
    .line.active {
      font-size: 56px;
      line-height: 1.25;
      color: var(--text);
      text-shadow: 0 0 40px rgba(203, 183, 251, 0.35);
      letter-spacing: 0.08em;
      font-weight: 500;
    }
    .line.near-1 {
      font-size: 22px;
      color: var(--text-fade);
      opacity: 0.6;
    }
    .line.near-2 {
      font-size: 18px;
      color: var(--text-dim);
      opacity: 0.5;
    }

    /* 状态指示 */
    .status-pill {
      display: inline-block;
      padding: 0.3rem 0.9rem;
      font-size: 10px;
      letter-spacing: 0.4em;
      color: var(--accent);
      background: rgba(203, 183, 251, 0.08);
      border: 1px solid rgba(203, 183, 251, 0.2);
      border-radius: 999px;
      margin-bottom: 3rem;
      text-transform: uppercase;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.85; box-shadow: 0 0 12px rgba(203, 183, 251, 0.15); }
      50% { opacity: 1; box-shadow: 0 0 24px rgba(203, 183, 251, 0.3); }
    }

    /* 底部 transport */
    .transport {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      padding: 1.2rem 2rem;
      z-index: 50;
      background: linear-gradient(180deg, transparent 0%, rgba(10, 8, 22, 0.85) 100%);
    }
    .transport-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .ctrl {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text);
      cursor: pointer;
      padding: 0;
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .ctrl:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.25);
    }
    .ctrl.play {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg-2);
      width: 46px; height: 46px;
    }
    .ctrl.play:hover {
      background: #d9c7ff;
      transform: scale(1.05);
    }
    .ctrl svg { width: 16px; height: 16px; fill: currentColor; }
    .ctrl.play svg { width: 18px; height: 18px; }

    .progress {
      flex: 1; display: flex; align-items: center; gap: 0.7rem;
      font-size: 11px; color: var(--text-fade);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
    }
    .progress-bar {
      flex: 1; height: 2px;
      background: rgba(255, 255, 255, 0.12);
      position: relative;
    }
    .progress-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: var(--accent);
      width: 42%;
      box-shadow: 0 0 10px rgba(203, 183, 251, 0.5);
    }

    .now-info {
      position: fixed;
      bottom: 5rem;
      left: 50%; transform: translateX(-50%);
      font-size: 12px;
      letter-spacing: 0.25em;
      color: var(--text-fade);
      z-index: 50;
      text-transform: uppercase;
    }

    @media (max-width: 720px) {
      .line.active { font-size: 36px; }
      .line.far-1, .line.near-1 { font-size: 18px; }
      .line.far-2, .line.near-2 { font-size: 15px; }
      .stage { padding: 6rem 1.2rem 7rem; }
    }
  </style>
</head>
<body>
  <div class="demo-nav">
    <a href="paper-scroll.html">留白纸页</a>
    <a href="typewriter.html">终端打字机</a>
    <a href="magazine.html">杂志双栏</a>
    <a href="spotlight.html" class="active">卡拉OK</a>
    <a href="/">原版</a>
  </div>

  <div class="corner-tl">CLAUDIO · EP 23</div>
  <div class="corner-tr">12:43 · ☀ 22°</div>

  <main class="stage">
    <div class="focus-area">
      <span class="status-pill">SPEAKING ···</span>
      <div class="stack">
        <div class="line far-2">天空忽然就晴了</div>
        <div class="line far-1">钢琴前奏轻轻落下</div>
        <div class="line active">这是周杰伦的《晴天》</div>
        <div class="line near-1">写给少年时的喜欢</div>
        <div class="line near-2">像雨刚停 太阳要出来</div>
      </div>
    </div>
  </main>

  <div class="now-info">晴天 &nbsp;·&nbsp; 周杰伦</div>

  <footer class="transport">
    <div class="transport-inner">
      <button class="ctrl" title="上一首">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zM9.5 12L20 6v12z"/></svg>
      </button>
      <button class="ctrl play" title="暂停">
        <svg viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
      <button class="ctrl" title="下一首">
        <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM4 18l10.5-6L4 6z"/></svg>
      </button>
      <div class="progress">
        <span>03:21</span>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <span>04:58</span>
      </div>
    </div>
  </footer>
</body>
</html>
