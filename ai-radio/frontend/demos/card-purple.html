<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo · 紫色光晕卡片</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont/lxgwwenkai-regular.css">
  <style>
    :root {
      --text: #f3eee7;
      --text-soft: rgba(243, 238, 231, 0.65);
      --text-fade: rgba(243, 238, 231, 0.4);
      --accent: #cbb7fb;
      --accent-bright: #e0d0ff;
      --line: rgba(255, 255, 255, 0.08);
      --font: 'JetBrains Mono', 'IBM Plex Mono', 'LXGW WenKai', monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow: hidden;
      position: relative;
      background: #0a0816;
    }
    /* === 动态光晕背景（核心） === */
    body::before {
      content: "";
      position: fixed; inset: -20%;
      background:
        radial-gradient(ellipse 50% 40% at 30% 30%, rgba(78, 56, 178, 0.55) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 70% 70%, rgba(178, 56, 134, 0.45) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 50% 50%, rgba(56, 100, 178, 0.35) 0%, transparent 65%);
      filter: blur(70px);
      animation: aurora 18s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes aurora {
      0%, 100% {
        transform: translate(0, 0) scale(1);
        filter: blur(70px) hue-rotate(0deg);
      }
      33% {
        transform: translate(5%, -3%) scale(1.08);
        filter: blur(80px) hue-rotate(20deg);
      }
      66% {
        transform: translate(-3%, 4%) scale(1.05);
        filter: blur(75px) hue-rotate(-15deg);
      }
    }
    /* 颗粒星点 */
    body::after {
      content: "";
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 17% 23%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1.2px 1.2px at 43% 71%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 67% 39%, rgba(255,255,255,0.45), transparent),
        radial-gradient(1px 1px at 89% 81%, rgba(255,255,255,0.35), transparent),
        radial-gradient(1.3px 1.3px at 23% 91%, rgba(203,183,251,0.5), transparent);
      pointer-events: none;
      z-index: 1;
      animation: twinkle 5s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.6; } to { opacity: 1; }
    }

    .demo-nav {
      position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
      display: flex;
      padding: 0.3rem 0.4rem;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      border-radius: 999px;
      z-index: 100;
      font-size: 11px;
      gap: 0.3rem;
    }
    .demo-nav a {
      padding: 0.3rem 0.8rem;
      color: var(--text-soft);
      text-decoration: none;
      border-radius: 999px;
      letter-spacing: 0.04em;
      transition: all 0.15s;
    }
    .demo-nav a:hover { color: var(--text); }
    .demo-nav a.active { background: var(--accent); color: #0a0816; }

    /* === 主卡片 === */
    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      min-height: 600px;
      padding: 1.8rem 1.6rem 1.4rem;
      background: rgba(15, 12, 30, 0.55);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      box-shadow:
        0 24px 80px rgba(20, 18, 50, 0.5),
        0 4px 16px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      display: flex;
      flex-direction: column;
    }

    /* 顶部信息条 */
    .env-line {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 0.5rem 0.3rem;
      font-size: 11px;
      color: var(--accent);
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.06em;
    }
    .env-sep { opacity: 0.5; padding: 0 0.15rem; }

    /* 字段块 */
    .info-block { margin: 1.4rem 0 1.2rem; }
    .info-row {
      display: grid;
      grid-template-columns: 3em 0.6em 1fr;
      margin-bottom: 0.3rem;
      font-size: 13px;
      align-items: baseline;
    }
    .info-key { color: var(--text-soft); letter-spacing: 0.25em; font-size: 12px; }
    .info-sep { color: var(--text-fade); }

    /* 反馈按钮 */
    .feedback-row {
      display: flex; gap: 0.5rem;
      margin-bottom: 1.2rem;
    }
    .btn-mini {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text-soft);
      padding: 0.3rem 0.7rem;
      font-size: 10px;
      font-family: var(--font);
      letter-spacing: 0.1em;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-mini:hover { color: var(--accent); border-color: var(--accent); }

    /* 歌词流 */
    .stream {
      flex: 1;
      min-height: 200px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 0.45rem;
      padding: 0.5rem 0;
      position: relative;
      mask-image: linear-gradient(180deg, transparent 0%, #000 25%, #000 100%);
      -webkit-mask-image: linear-gradient(180deg, transparent 0%, #000 25%, #000 100%);
    }
    .line {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-soft);
      opacity: 0.45;
      padding-left: 1.3rem;
      position: relative;
      transition: all 0.3s;
    }
    .line.is-narration { font-style: italic; }
    .line.is-narration::before {
      content: ">"; position: absolute; left: 0;
      color: var(--accent); font-style: normal;
    }
    .line.is-lyric::before {
      content: "$"; position: absolute; left: 0;
      color: var(--accent);
    }
    .line.past { opacity: 0.3; }
    .line.active {
      opacity: 1;
      color: var(--text);
      font-size: 15.5px;
    }
    .line.active::after {
      content: "█";
      animation: blink 1s steps(2) infinite;
      color: var(--accent);
      margin-left: 4px;
      font-size: 12px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* 底部 transport */
    .transport {
      margin-top: 1rem;
      padding-top: 0.9rem;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .ctrl {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text);
      padding: 0.4rem 0.7rem;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 0.08em;
      border-radius: 4px;
      cursor: pointer;
    }
    .ctrl.play {
      background: var(--accent);
      color: #0a0816;
      border-color: var(--accent);
      display: inline-flex; align-items: center; justify-content: center;
      width: 38px; height: 30px; padding: 0;
    }
    .ctrl.play svg { fill: currentColor; }
    .progress {
      flex: 1; display: flex; align-items: center; gap: 0.5rem;
      font-size: 10px; color: var(--text-fade);
      font-variant-numeric: tabular-nums;
    }
    .progress-bar {
      flex: 1; height: 2px;
      background: rgba(255,255,255,0.1);
      position: relative;
      border-radius: 2px;
    }
    .progress-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 42%;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(203,183,251,0.6);
      border-radius: 2px;
    }
    .cfg-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #0a0816;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(203,183,251,0.5);
      transition: transform 0.2s;
    }
    .cfg-btn:hover { transform: rotate(60deg); }
  </style>
</head>
<body>
  <div class="demo-nav">
    <a href="card-purple.html" class="active">紫色光晕</a>
    <a href="card-gradient.html">多色渐变</a>
    <a href="card-pulse.html">琥珀脉动</a>
    <a href="card-drift.html">光斑漂移</a>
    <a href="/">原版</a>
  </div>

  <div class="card">
    <div class="env-line">
      <span>北京</span><span class="env-sep">·</span>
      <span>🌧 阵雨 21°</span><span class="env-sep">·</span>
      <span>● 18:21 现场</span>
    </div>
    <div class="info-block">
      <div class="info-row"><span class="info-key">曲目</span><span class="info-sep">:</span><span>晴天</span></div>
      <div class="info-row"><span class="info-key">歌手</span><span class="info-sep">:</span><span>周杰伦</span></div>
      <div class="info-row"><span class="info-key">模式</span><span class="info-sep">:</span><span>歌曲介绍</span></div>
    </div>
    <div class="feedback-row">
      <button class="btn-mini">[ ♥ 喜欢 ]</button>
      <button class="btn-mini">[ ✕ 跳过 ]</button>
    </div>
    <div class="stream">
      <div class="line is-narration past">天空忽然就晴了。</div>
      <div class="line is-narration past">这是周杰伦的《晴天》。</div>
      <div class="line is-lyric past">故事的小黄花</div>
      <div class="line is-lyric past">从出生那年就飘着</div>
      <div class="line is-lyric active">童年的荡秋千</div>
    </div>
    <div class="transport">
      <button class="ctrl">&lt;&lt;</button>
      <button class="ctrl play">
        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M6 5h4v14H6zM14 5h4v14h-4z" fill="currentColor"/></svg>
      </button>
      <button class="ctrl">&gt;&gt;</button>
      <div class="progress">
        <span>03:21</span>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <span>04:58</span>
      </div>
      <button class="cfg-btn">⚙</button>
    </div>
  </div>
</body>
</html>
